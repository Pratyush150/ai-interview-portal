<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>AI Interview Portal</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Inline critical styles as fallback if CSS file fails to load */
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 1rem; }
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>AI Interview Portal</h1>
            <p class="subtitle">Voice-based Technical Interview</p>
        </header>

        <!-- Setup Screen -->
        <div id="setup-screen" class="screen active">
            <div class="card">
                <h2>Start Your Interview</h2>
                <p>This AI interviewer will assess your skills in software engineering, AI/ML, and robotics.</p>
                <div class="form-group">
                    <label for="candidate-name">Your Name</label>
                    <input type="text" id="candidate-name" placeholder="Enter your name" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="use-structured" checked>
                        Enable evaluation scoring
                    </label>
                </div>
                <button id="start-btn" class="btn btn-primary">Start Interview</button>
            </div>
        </div>

        <!-- Interview Screen -->
        <div id="interview-screen" class="screen">
            <!-- Status Bar -->
            <div class="status-bar">
                <div class="status-item">
                    <span class="label">Stage</span>
                    <span id="stage-badge" class="badge">intro</span>
                </div>
                <div class="status-item">
                    <span class="label">Turn</span>
                    <span id="turn-count">0</span>
                </div>
                <div class="status-item">
                    <span class="label">Score</span>
                    <span id="avg-score">--</span>
                </div>
            </div>

            <!-- Conversation -->
            <div id="conversation" class="conversation">
                <!-- Messages rendered here -->
            </div>

            <!-- Controls -->
            <div class="controls">
                <div id="mic-status" class="mic-status">
                    <span id="mic-indicator" class="indicator"></span>
                    <span id="mic-text">Click to speak</span>
                </div>
                <button id="mic-btn" class="btn btn-mic" title="Hold to speak">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>

                <!-- Text input fallback -->
                <div class="text-input-row">
                    <input type="text" id="text-input" placeholder="Type your answer (or use mic)..." autocomplete="off">
                    <button id="send-btn" class="btn btn-send">Send</button>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <div class="card">
                <h2>Interview Complete</h2>
                <div id="results-summary"></div>
                <button id="restart-btn" class="btn btn-primary">Start New Interview</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
