# Aperture AI Interview Portal — nginx vhost
#
# - Terminates TLS with a self-signed cert (Let's Encrypt drop-in later)
# - Serves the Next.js static export from web/out/ directly (fast path)
# - Reverse-proxies /api/, /ws/, /static/, /candidate/ to uvicorn at :8000
# - Forces HTTPS by 301-redirecting all :80 traffic
# - Bumps client_max_body_size for resume PDF uploads
#
# Install path is templated; deploy/install.sh substitutes the markers.

# HTTPS — the real one
# Note: `listen ... ssl http2` is the pre-1.25 form. Ubuntu 22.04 ships
# nginx 1.18 which rejects the newer `http2 on;` directive.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     __CERT_DIR__/fullchain.pem;
    ssl_certificate_key __CERT_DIR__/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Resume uploads (~1–5 MB typical) + audio chunks.
    client_max_body_size 20m;

    # Long timeouts because an STT/LLM round-trip can take 8–15 seconds.
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;

    # Recommended security headers. HSTS off for self-signed (would
    # block fallback). Re-enable once you put Let's Encrypt in front.
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Backend API + WebSocket + audio + legacy portal ──────────────────
    # Anything FastAPI owns goes upstream. We match prefixes that are
    # registered in backend/api.py: /api, /ws, /static, /candidate.
    location ~ ^/(api|ws|static|candidate)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js static export ────────────────────────────────────────────
    # The export ships with index.html at every route directory, so we
    # try a file → .html → directory/index.html → fall back to 404.
    root __REPO_DIR__/web/out;
    index index.html;

    # Long cache for hashed Next chunks; everything else is short cache
    # so a redeploy doesn't strand old HTML pointing at gone chunks.
    location /_next/static/ {
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }
}

# Force HTTPS — :80 always redirects.
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}
